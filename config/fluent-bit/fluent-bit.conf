# =============================================================================
# Fluent Bit — сбор логов из Docker контейнеров
# =============================================================================
#
# Архитектура:
#
#   Любой контейнер → stdout/stderr
#       ↓ Docker fluentd logging driver (async, non-blocking)
#   Fluent Bit (:24224 forward input)
#       ↓ Единый индекс logs-* с полем log_type для разделения
#   OpenSearch
#
# Принцип: один индекс, фильтрация по полям.
#   log_type=app   — Laravel JSON-логи (channel, trace_id, level...)
#   log_type=infra — FPM, nginx, postgres, redis, OTel, Jaeger...
#
# Почему один индекс:
#   - trace → logs в Grafana работает без переключения datasource
#   - один datasource, один набор алертов
#   - простые запросы: log_type:app AND level:ERROR
# =============================================================================

[SERVICE]
    Flush           5
    Daemon          Off
    Log_Level       info
    Parsers_File    /fluent-bit/etc/parsers.conf
    HTTP_Server     On
    HTTP_Listen     0.0.0.0
    HTTP_Port       2020
    storage.path              /fluent-bit/db/
    storage.sync              normal
    storage.checksum          off
    storage.backlog.mem_limit 50M

# =============================================================================
# INPUT: Приём логов от Docker fluentd driver
# =============================================================================

[INPUT]
    Name          forward
    Listen        0.0.0.0
    Port          24224
    Buffer_Chunk_Size  256k
    Buffer_Max_Size    512k

# =============================================================================
# FILTER 1: Парсинг JSON-строк из лога
# =============================================================================
# Пытаемся распарсить поле "log" как JSON.
# Laravel пишет JSON → поля раскрываются (message, channel, level_name...).
# FPM/nginx пишут plain text → остаётся как есть в поле "log".

[FILTER]
    Name          parser
    Match         *
    Key_Name      log
    Parser        json
    Reserve_Data  On
    Preserve_Key  Off

# =============================================================================
# FILTER 2: Разделение app и infra по наличию channel
# =============================================================================
# Monolog ВСЕГДА добавляет channel — надёжный маркер app-лога.
# Если channel есть → перетегируем в app.{tag}.
# false = оригинал НЕ сохраняется (без дублей).

[FILTER]
    Name          rewrite_tag
    Match         docker.*
    Rule          $channel .+ app.$TAG false
    Emitter_Name  re_emitter

# =============================================================================
# FILTER 3: Метки log_type
# =============================================================================
# После rewrite_tag:
#   docker.* = infra (FPM lifecycle, nginx, postgres, redis...)
#   app.*    = app   (Laravel Monolog JSON)

[FILTER]
    Name          modify
    Match         docker.*
    Add           log_type infra

[FILTER]
    Name          modify
    Match         app.*
    Add           log_type app

# =============================================================================
# FILTER 4: Нормализация infra-логов
# =============================================================================
# Проблема: у infra-логов нет полей message и level — всё в сыром "log".
# Grafana настроена на logMessageField=message и logLevelField=level.
# Без этих полей инфра-логи — пустые строки в Explore.
#
# Решение: переименовываем log → message, ставим level=info по умолчанию.

[FILTER]
    Name          modify
    Match         docker.*
    Rename        log message
    Add           level info
    Add           level_name INFO

# =============================================================================
# FILTER 5: Чистка служебных полей Docker
# =============================================================================

[FILTER]
    Name          modify
    Match         *
    Remove        container_id

# =============================================================================
# OUTPUT: Все логи → единый индекс logs-*
# =============================================================================

[OUTPUT]
    Name                opensearch
    Match               app.*
    Host                opensearch
    Port                9200
    tls                 Off
    Suppress_Type_Name  On
    Logstash_Format     On
    Logstash_Prefix     logs
    Logstash_DateFormat %Y.%m.%d
    Include_Tag_Key     On
    Tag_Key             fluent_tag
    Retry_Limit         5
    Buffer_Size         512KB
    Generate_ID         On

[OUTPUT]
    Name                opensearch
    Match               docker.*
    Host                opensearch
    Port                9200
    tls                 Off
    Suppress_Type_Name  On
    Logstash_Format     On
    Logstash_Prefix     logs
    Logstash_DateFormat %Y.%m.%d
    Include_Tag_Key     On
    Tag_Key             fluent_tag
    Retry_Limit         5
    Buffer_Size         512KB
    Generate_ID         On

# =============================================================================
# OUTPUT: Debug (раскомментировать для отладки)
# =============================================================================
