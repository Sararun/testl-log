# =============================================================================
# Fluent Bit Configuration
# =============================================================================
#
# Роль: собирает логи Laravel из файлов, парсит JSON, отправляет в OpenSearch.
#
# Pipeline:
#   /var/log/laravel/laravel.log → [INPUT tail] → [FILTER] → [OUTPUT opensearch]
#
# Почему file tail, а не Docker fluentd driver:
#   - Если Fluent Bit упал, Docker fluentd driver блокирует запуск контейнеров
#   - File tail — пассивный сбор, не зависит от жизненного цикла приложения
#   - Проще отлаживать (файл всегда доступен для просмотра)
#
# =============================================================================

[SERVICE]
    # Flush interval — как часто отправлять данные в OpenSearch (секунды).
    Flush           5
    # Daemon off — запускаем на переднем плане (для Docker).
    Daemon          Off
    # Уровень логирования самого Fluent Bit.
    Log_Level       info
    # Parsers file — определения парсеров (JSON, regex и т.д.)
    Parsers_File    parsers.conf
    # HTTP Server — healthcheck для docker-compose.
    HTTP_Server     On
    HTTP_Listen     0.0.0.0
    HTTP_Port       2020
    # Storage — буфер на диске (защита от потери логов при недоступности OpenSearch).
    storage.path              /fluent-bit/db/
    storage.sync              normal
    storage.checksum          off
    # Максимум 50MB буфера на диске.
    storage.backlog.mem_limit 50M

# =============================================================================
# INPUT: Чтение лог-файлов Laravel
# =============================================================================

[INPUT]
    Name              tail
    Tag               laravel.*
    # Путь к лог-файлам. Laravel по умолчанию пишет в storage/logs/laravel.log
    # Мы монтируем эту директорию в контейнер Fluent Bit.
    Path              /var/log/laravel/*.log
    # Exclude rotated/compressed files
    Exclude_Path      /var/log/laravel/*.gz,/var/log/laravel/*.zip
    # Multiline — склеиваем стектрейсы PHP в одну запись.
    # Без этого каждая строка стектрейса будет отдельным лог-событием.
    multiline.parser  multiline-laravel
    # Позиция чтения (db file) — чтобы после рестарта не перечитывать логи.
    DB                /fluent-bit/db/laravel.db
    DB.locking        true
    # Интервал проверки новых данных (секунды).
    Refresh_Interval  5
    # Размер буфера для чтения (32KB по умолчанию, увеличиваем для длинных стектрейсов).
    Buffer_Max_Size   256k
    Buffer_Chunk_Size 64k
    # Читать с конца файла при первом запуске (не перечитывать историю).
    Read_from_Head    false
    # Лимит памяти для этого input.
    Mem_Buf_Limit     10MB
    # Ротация файлов — отслеживать переименованные файлы.
    Rotate_Wait       30
    Skip_Long_Lines   On
    Skip_Empty_Lines  On

# =============================================================================
# FILTER: Парсинг и обогащение логов
# =============================================================================

# Парсим JSON-тело лога. Laravel с JSON formatter выдаёт:
# {"message":"...","context":{...},"level":"ERROR","level_name":"error",
#  "channel":"production","datetime":"2024-01-01T00:00:00+00:00","extra":{}}
[FILTER]
    Name          parser
    Match         laravel.*
    Key_Name      log
    Parser        json
    Reserve_Data  On
    Preserve_Key  On

# Добавляем метаданные для фильтрации в OpenSearch/Grafana.
[FILTER]
    Name   modify
    Match  laravel.*
    Add    service_name laravel-crm
    Add    environment  development

# Убираем пустые поля (экономия места в OpenSearch).
[FILTER]
    Name          nest
    Match         laravel.*
    Operation     lift
    Nested_under  extra
    Add_prefix    extra_

# =============================================================================
# OUTPUT: OpenSearch
# =============================================================================

[OUTPUT]
    Name                opensearch
    Match               laravel.*
    # Адрес OpenSearch (имя сервиса из docker-compose).
    Host                opensearch
    Port                9200
    # Без TLS для локальной разработки.
    tls                 Off
    tls.verify          Off
    # Suppress_Type_Name — обязательно для OpenSearch 2.x (нет mapping types).
    Suppress_Type_Name  On
    # Index pattern с датой — позволяет удалять старые логи целыми индексами.
    # Формат: laravel-logs-2024.01.15
    Index               laravel-logs
    # Logstash_Format генерирует индексы с датой автоматически.
    Logstash_Format     On
    Logstash_Prefix     laravel-logs
    Logstash_DateFormat %Y.%m.%d
    # Включаем trace_id/span_id в лог (для корреляции с Jaeger в Grafana).
    Include_Tag_Key     On
    Tag_Key             fluent_tag
    # Retry — при недоступности OpenSearch.
    Retry_Limit         5
    # Buffer size для HTTP запросов к OpenSearch.
    Buffer_Size         512KB
    # Время ожидания ответа от OpenSearch.
    Net.Connect_Timeout       10
    Net.Keepalive             On
    Net.Keepalive_Idle_Timeout 30
    # Количество логов в одном bulk-запросе.
    # Больше = эффективнее, но дольше задержка.
    # 500 — хороший баланс для CRM с 10-50К логов/день.
    Generate_ID         On

# =============================================================================
# OUTPUT: Stdout (для отладки, в проде убрать)
# =============================================================================

# [OUTPUT]
#     Name   stdout
#     Match  laravel.*
#     Format json_lines