# =============================================================================
# Fluent Bit — сбор логов из Docker контейнеров
# =============================================================================
#
# Архитектура:
#
#   Любой контейнер → stdout/stderr
#       ↓ Docker fluentd logging driver (async, non-blocking)
#   Fluent Bit (:24224 forward input)
#       ↓ Парсинг: JSON → app-logs, plain text → infra-logs
#   OpenSearch
#
# Универсально: PHP-FPM, CLI, Node.js, nginx — любой контейнер
# просто пишет в stdout, Fluent Bit получает автоматически.
#
# =============================================================================

[SERVICE]
    Flush           5
    Daemon          Off
    Log_Level       info
    Parsers_File    /fluent-bit/etc/parsers.conf
    HTTP_Server     On
    HTTP_Listen     0.0.0.0
    HTTP_Port       2020
    storage.path              /fluent-bit/db/
    storage.sync              normal
    storage.checksum          off
    storage.backlog.mem_limit 50M

# =============================================================================
# INPUT: Приём логов от Docker fluentd driver
# =============================================================================
# Docker отправляет логи сюда по TCP. Каждая запись содержит:
#   - tag: docker.{container_name}  (настраивается в docker-compose)
#   - log: строка из stdout/stderr контейнера
#   - container_name, container_id, source (stdout|stderr)

[INPUT]
    Name          forward
    Listen        0.0.0.0
    Port          24224
    Buffer_Chunk_Size  256k
    Buffer_Max_Size    512k

# =============================================================================
# FILTER: Парсинг JSON-строк из лога
# =============================================================================
# Пытаемся распарсить поле "log" как JSON.
# Если строка — валидный JSON (Laravel лог) → поля раскрываются.
# Если plain text (FPM, nginx) → остаётся как есть в поле "log".

[FILTER]
    Name          parser
    Match         *
    Key_Name      log
    Parser        json
    Reserve_Data  On
    Preserve_Key  Off

# =============================================================================
# FILTER: Разделение app-логов и infra-логов
# =============================================================================
# После JSON-парсинга у Laravel логов появляется поле "channel".
# Monolog ВСЕГДА добавляет channel — это надёжный маркер.
#
# Если channel есть → app лог → перетегируем в app.{container}
# Если channel нет  → infra лог → остаётся с исходным тегом docker.*

[FILTER]
    Name          rewrite_tag
    Match         docker.*
    Rule          $channel .+ app.$TAG false
    Emitter_Name  re_emitter

# =============================================================================
# FILTER: Метки типа лога
# =============================================================================

[FILTER]
    Name          modify
    Match         docker.*
    Add           log_type infra

[FILTER]
    Name          modify
    Match         app.*
    Add           log_type app

# =============================================================================
# FILTER: Чистка служебных полей Docker
# =============================================================================

[FILTER]
    Name          modify
    Match         *
    Remove        container_id

# =============================================================================
# OUTPUT: App-логи → OpenSearch
# =============================================================================
# Laravel, CLI artisan, Node.js — структурированный JSON с channel, level и т.д.

[OUTPUT]
    Name                opensearch
    Match               app.*
    Host                opensearch
    Port                9200
    tls                 Off
    Suppress_Type_Name  On
    Logstash_Format     On
    Logstash_Prefix     logs
    Logstash_DateFormat %Y.%m.%d
    Include_Tag_Key     On
    Tag_Key             fluent_tag
    Retry_Limit         5
    Buffer_Size         512KB
    Generate_ID         On

# =============================================================================
# OUTPUT: Infra-логи → OpenSearch
# =============================================================================
# FPM lifecycle, nginx access/error, postgres, redis — системные логи.

[OUTPUT]
    Name                opensearch
    Match               docker.*
    Host                opensearch
    Port                9200
    tls                 Off
    Suppress_Type_Name  On
    Logstash_Format     On
    Logstash_Prefix     logs
    Logstash_DateFormat %Y.%m.%d
    Include_Tag_Key     On
    Tag_Key             fluent_tag
    Retry_Limit         5
    Buffer_Size         512KB
    Generate_ID         On

# =============================================================================
# OUTPUT: Debug (раскомментировать для отладки)
# =============================================================================
# [OUTPUT]
#     Name   stdout
#     Match  *
#     Format json_lines