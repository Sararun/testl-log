[SERVICE]
    Flush           5
    Daemon          Off
    Log_Level       info
    Parsers_File    /fluent-bit/etc/parsers.conf
    HTTP_Server     On
    HTTP_Listen     0.0.0.0
    HTTP_Port       2020
    storage.path              /fluent-bit/db/
    storage.sync              normal
    storage.checksum          off
    storage.backlog.mem_limit 50M

# =============================================================================
# INPUT: Чтение JSON-логов Laravel из файла
# =============================================================================
# С ObservabilityFormatter каждый лог = одна строка JSON.
# Multiline не нужен — стектрейсы внутри JSON-поля, не разбиты по строкам.

[INPUT]
    Name              tail
    Tag               laravel.*
    Path              /var/log/laravel/*.log
    Exclude_Path      /var/log/laravel/*.gz,/var/log/laravel/*.zip
    DB                /fluent-bit/db/laravel.db
    DB.locking        true
    Refresh_Interval  5
    Buffer_Max_Size   256k
    Buffer_Chunk_Size 64k
    Read_from_Head    true
    Mem_Buf_Limit     10MB
    Skip_Long_Lines   On
    Skip_Empty_Lines  On

# =============================================================================
# FILTER: Парсинг JSON
# =============================================================================

[FILTER]
    Name          parser
    Match         laravel.*
    Key_Name      log
    Parser        json
    Reserve_Data  On

[FILTER]
    Name   modify
    Match  laravel.*
    Add    service_name laravel-crm
    Add    environment  development

# =============================================================================
# OUTPUT: OpenSearch
# =============================================================================

[OUTPUT]
    Name                opensearch
    Match               laravel.*
    Host                opensearch
    Port                9200
    tls                 Off
    Suppress_Type_Name  On
    Logstash_Format     On
    Logstash_Prefix     laravel-logs
    Logstash_DateFormat %Y.%m.%d
    Include_Tag_Key     On
    Tag_Key             fluent_tag
    Retry_Limit         5
    Buffer_Size         512KB
    Generate_ID         On

# Раскомментировать для отладки — покажет логи в stdout fluent-bit
# [OUTPUT]
#     Name   stdout
#     Match  laravel.*
#     Format json_lines