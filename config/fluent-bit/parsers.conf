[PARSER]
    Name        json
    Format      json
    Time_Key    datetime
    Time_Format %Y-%m-%dT%H:%M:%S.%L%z
    Time_Keep   On

[PARSER]
    Name        laravel-default
    Format      regex
    Regex       ^\[(?<datetime>[^\]]+)\] (?<channel>\w+)\.(?<level>\w+): (?<message>.+?)(?:\s+(?<context>\{.+\}))?$
    Time_Key    datetime
    Time_Format %Y-%m-%d %H:%M:%S
    Time_Keep   On
