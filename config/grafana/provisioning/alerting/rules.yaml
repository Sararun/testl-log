apiVersion: 1

groups:
  - orgId: 1
    name: app-errors
    folder: Alerts
    interval: 5m
    rules:

      # Срабатывает если за последние 5 минут более 10 ERROR-логов приложения
      - uid: app-error-spike
        title: "Error spike"
        condition: threshold
        for: 0s
        noDataState: OK
        execErrState: Error
        annotations:
          summary: "More than 10 errors in the last 5 minutes"
        data:
          - refId: errors
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: opensearch
            model:
              query: "level_name:ERROR AND log_type:app"
              timeField: "@timestamp"
              metrics:
                - type: count
                  id: "1"
              bucketAggs:
                - type: date_histogram
                  id: "2"
                  field: "@timestamp"
                  settings:
                    interval: "5m"
                    min_doc_count: "0"

          - refId: total
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: reduce
              refId: total
              expression: errors
              reducer: sum

          - refId: threshold
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: __expr__
            model:
              type: threshold
              refId: threshold
              expression: total
              conditions:
                - evaluator:
                    type: gt
                    params:
                      - 10
                  operator:
                    type: and
                  query:
                    params:
                      - threshold
                  reducer:
                    type: last
                  type: query