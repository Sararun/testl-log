apiVersion: 1

datasources:

  # --- Jaeger (traces) ---
  # tracesToLogsV2: при клике на трейс в Jaeger → переход к логам в OpenSearch.
  # Lua-фильтр в Fluent Bit промоутит trace_id на корневой уровень,
  # поэтому query простой: trace_id:xxx (не context.trace_id).
  - name: Jaeger
    type: jaeger
    access: proxy
    url: http://jaeger:16686
    uid: jaeger
    jsonData:
      tracesToLogsV2:
        datasourceUid: opensearch
        spanStartTimeShift: "-1h"
        spanEndTimeShift: "1h"
        filterByTraceID: false
        filterBySpanID: false
        customQuery: true
        query: "context.trace_id:${__span.traceId} AND log_type:app"

  # --- OpenSearch (единый логовый индекс) ---
  # Один индекс logs-*, один datasource.
  # Фильтрация по полям:
  #   log_type:app   — Laravel логи
  #   log_type:infra — FPM, nginx, postgres, redis...
  #   container_name:php-fpm — конкретный контейнер
  #   trace_id:abc123 — корреляция с Jaeger
  - name: OpenSearch Logs
    type: grafana-opensearch-datasource
    uid: opensearch
    access: proxy
    url: http://opensearch:9200
    jsonData:
      database: "logs-*"
      flavor: opensearch
      version: "2.19.1"
      timeField: "@timestamp"
      logMessageField: "message"
      logLevelField: "level_name.keyword"
      pplEnabled: false

  # --- Prometheus ---
  - name: Prometheus
    type: prometheus
    uid: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    jsonData:
      timeInterval: "15s"