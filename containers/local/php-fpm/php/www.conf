; =============================================================================
; php-fpm pool configuration
; =============================================================================
;
; КРИТИЧЕСКИ ВАЖНАЯ НАСТРОЙКА: clear_env = no
;
; По умолчанию php-fpm ОЧИЩАЕТ все environment-переменные перед запуском
; worker-процессов. Это значит что OTEL_* переменные из Docker environment
; НЕ БУДУТ доступны PHP-коду.
;
; clear_env = no — передаёт все env-переменные из parent-процесса
; в worker-процессы php-fpm. Без этого OTel auto-instrumentation НЕ работает.
;
; =============================================================================

[www]
user = laravel
group = laravel

listen = 0.0.0.0:9000

; --- Процессы ---
pm = dynamic
pm.max_children = 20
pm.start_servers = 4
pm.min_spare_servers = 2
pm.max_spare_servers = 6
pm.max_requests = 500

; --- ОБЯЗАТЕЛЬНО для OpenTelemetry ---
; Без этого OTEL_* переменные не попадут в PHP-процессы.
clear_env = no

; --- Логирование ---
; Ошибки php-fpm пишем в stderr (Docker подхватывает через docker logs).
catch_workers_output = yes
decorate_workers_output = no

; --- Таймауты ---
request_terminate_timeout = 60s