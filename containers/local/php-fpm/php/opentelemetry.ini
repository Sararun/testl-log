; =============================================================================
; OpenTelemetry PHP Extension Configuration
; =============================================================================
; Файл: php/opentelemetry.ini
; Копируется в /usr/local/etc/php/conf.d/99-opentelemetry.ini
;
; Префикс 99- гарантирует загрузку ПОСЛЕ основных extension'ов.
; Это важно: OTel extension должен видеть PDO, Redis и т.д.
; чтобы корректно зарегистрировать на них хуки.
; =============================================================================

[opentelemetry]
; Extension уже включен через docker-php-ext-enable, но на всякий случай:
; extension=opentelemetry

; Валидация hook-функций.
; On = проверяет что hook корректно оборачивает оригинальную функцию.
; Включает небольшой overhead (~0.1ms), но защищает от багов в auto-instrumentation.
; В production можно отключить после стабилизации.
opentelemetry.validate_hook_functions = On

; Разрешение конфликтов с другими extension'ами.
; "none" = OTel не конфликтует ни с чем.
; Если xdebug вызывает проблемы, укажите "xdebug" здесь.
opentelemetry.conflicts = none

; =============================================================================
; ВАЖНО: xdebug + opentelemetry
; =============================================================================
; Оба extension'а используют function hooking. В development они работают
; вместе, но xdebug добавляет ~50ms overhead к каждому запросу.
;
; В production xdebug ДОЛЖЕН быть отключен.
; Либо через отдельный Dockerfile для production (без pecl install xdebug),
; либо через:
;   docker-compose.yml → environment: → XDEBUG_MODE=off
;
; Когда xdebug отключен через XDEBUG_MODE=off, его хуки не активируются,
; и OTel extension работает с полной скоростью.
; =============================================================================